<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presensi PKL - Web Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Camera Preview for Browser Geolocation & User Selfie */
        #selfie-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--accent);
            display: none;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <i class="fas fa-fingerprint fa-3x" style="color: var(--primary)"></i>
        </div>
        <h1>Presensi PKL</h1>
        <p class="subtitle">Platform Portabel untuk iOS & Android test 1 </p>
    </header>

    <!-- -- SETUP SECTION (Hidden if already registered) -- -->
    <section id="setup-view" class="hidden">
        <div class="form-group">
            <label>Pilih DUDI (Perusahaan)</label>
            <select id="select-dudi">
                <option value="">-- Memuat Data DUDI --</option>
            </select>
        </div>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <select id="select-student" disabled>
                <option value="">-- Pilih DUDI Terlebih Dahulu --</option>
            </select>
        </div>

        <div class="form-group">
            <label>Kelas</label>
            <input type="text" id="display-class" readonly placeholder="Kelas otomatis terpilih">
        </div>

        <div class="form-group">
            <label>Foto Profil (Wajib Sekali Saja)</label>
            <div class="camera-container" id="camera-click-area">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" class="hidden"></canvas>
                <img id="setup-preview" class="hidden" style="width:100%; height:100%; object-fit:cover; border-radius:16px;">
                <div class="camera-overlay"></div>
                <div style="position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; background: rgba(0,0,0,0.5); padding: 5px;">
                    <i class="fas fa-camera"></i> Klik Box untuk Ambil Foto
                </div>
            </div>
        </div>

        <button id="btn-save-setup" class="btn btn-primary">
            <i class="fas fa-check-circle"></i> Simpan & Mulai Presensi
        </button>
    </section>

    <!-- -- HOME / ATTENDANCE SECTION -- -->
    <section id="home-view" class="hidden">
        <div class="profile-card">
            <img id="home-profile-img" src="" alt="Profile" class="profile-img">
            <div class="profile-info">
                <h3 id="home-user-name">Memuat...</h3>
                <p id="home-user-info">DUDI: ... | Kelas: ...</p>
            </div>
            <button id="btn-edit-profile" style="margin-left: auto; background: none; border: none; color: var(--accent); cursor: pointer;">
                <i class="fas fa-edit"></i>
            </button>
        </div>

        <div id="status-display" class="status-badge status-pending">
            <p id="status-text">Memuat Status...</p>
        </div>

        <!-- Attendance Controls -->
        <div class="form-group" style="margin-top: 30px;">
            <button id="btn-masuk" class="btn btn-primary" style="margin-bottom: 15px;">
                <i class="fas fa-camera"></i> HADIR (Wajib Selfie)
            </button>
            <button id="btn-tidak-masuk" class="btn btn-danger">
                <i class="fas fa-times-circle"></i> TIDAK HADIR
            </button>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <p style="font-size: 12px; color: var(--text-dim);">
                <i class="fas fa-info-circle"></i> Pastikan mengizinkan GPS & Kamera
            </p>
        </div>
    </section>

    <!-- -- SELFIE MODAL (Fullscreen Overlay) -- -->
    <div id="selfie-modal" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
        <h3 style="margin-bottom: 20px;">Verifikasi Wajah</h3>
        <div class="camera-container" style="width: 250px; height: 250px; border-radius: 50%;">
            <video id="selfie-video" autoplay playsinline style="width:100%; height:100%; object-fit:cover; border-radius:50%; transform: scaleX(-1); border: 4px solid var(--accent);"></video>
            <img id="selfie-preview" class="hidden" style="width:100%; height:100%; object-fit:cover; border-radius:50%; transform: scaleX(-1); border: 4px solid var(--accent);">
            <canvas id="selfie-canvas" class="hidden"></canvas>
        </div>
        <p style="margin: 20px 0; font-size: 14px; text-align: center;">Posisikan wajah Anda di tengah lingkaran</p>
        <div style="display: flex; gap: 15px; width: 100%; max-width: 300px;">
            <button id="btn-capture-selfie" class="btn btn-primary" style="flex: 1;"><i class="fas fa-camera"></i> Foto</button>
            <button id="btn-cancel-selfie" class="btn btn-danger" style="flex: 1;"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- -- REASON MODAL -- -->
    <div id="reason-modal" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: #004e92; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px;">
            <h3 style="margin-bottom: 15px;">Alasan Tidak Hadir</h3>
            <div class="form-group">
                <textarea id="reason-text" rows="4" style="width: 100%; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px; color: white;" placeholder="Contoh: Sakit (Ada Surat), Izin Keluarga..."></textarea>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="btn-submit-reason" class="btn btn-primary" style="flex: 1;">Kirim</button>
                <button id="btn-close-reason" class="btn btn-danger" style="flex: 1;">Batal</button>
            </div>
        </div>
    </div>

    <!-- -- NOTIFICATION / RESULT OVERLAY -- -->
    <div id="notif-overlay" class="hidden" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 15px 30px; border-radius: 50px; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-weight: 600;">
        Berhasil!
    </div>

</div>

<!-- Scripts -->
<script src="script.js?v=2.0"></script>
</body>
</html>
